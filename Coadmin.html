<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>預約系統管理後台</title>
    <style>
        :root { --admin-primary: #34495e; --success: #27ae60; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .hidden { display: none; }
        
        /* 登入框樣式 */
        .login-box { max-width: 400px; margin: 100px auto; background: white; padding: 30px; border-radius: 12px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        
        /* 管理面板樣式 */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; border: 1px solid #eee; text-align: left; }
        th { background: var(--admin-primary); color: white; }
        
        .btn { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-login { background: var(--admin-primary); color: white; width: 100%; }
        .btn-approve { background: var(--success); color: white; margin-right: 5px; }
        .btn-delete { background: var(--danger); color: white; }
        .btn:hover { opacity: 0.8; }
        
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .status-pending { background: #f1c40f; color: #000; }
        .status-approved { background: #2ecc71; color: #white; }
    </style>
</head>
<body>

<div id="adminLogin" class="login-box">
    <h2>🛠️ 管理員登入</h2>
    <input type="text" id="admUser" placeholder="管理員帳號">
    <input type="password" id="admPass" placeholder="管理員密碼">
    <button class="btn btn-login" onclick="handleAdminLogin()">登入管理後台</button>
    <p id="loginErrMsg" style="color:red;"></p>
</div>

<div id="adminPanel" class="container hidden">
    <div class="header">
        <h2>🛠️ 預約管理控制台</h2>
        <div>
            <span id="adminName" style="margin-right:15px; font-weight:bold;"></span>
            <button class="btn" onclick="location.reload()">🔄 刷新數據</button>
        </div>
    </div>

    <div style="margin-bottom: 15px;">
        <strong>顯示篩選：</strong>
        <select id="statusFilter" onchange="renderAdminTable()">
            <option value="all">所有申請</option>
            <option value="Pending">待處理 (Pending)</option>
            <option value="Approved">已核准 (Approved)</option>
        </select>
    </div>

    <table id="adminTable">
        <thead>
            <tr>
                <th>日期</th>
                <th>地點</th>
                <th>申請人</th>
                <th>時段</th>
                <th>狀態</th>
                <th>操作面板</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzUL7LUaAHG5Fh3alvSMQIhzzblyP_cuOBjuijrO3AoNJg8gzn8GOP7vtLXbPVxAFjh/exec'; // <--- 請換成最新的 GAS 網址
    let allData = [];

    // 處理管理員登入
    async function handleAdminLogin() {
        const u = document.getElementById('admUser').value;
        const p = document.getElementById('admPass').value;
        const errMsg = document.getElementById('loginErrMsg');

        try {
            const res = await fetch(`${scriptURL}?type=login&user=${u}&pass=${p}`);
            const result = await res.json();

            if (result.success) {
                document.getElementById('adminLogin').classList.add('hidden');
                document.getElementById('adminPanel').classList.remove('hidden');
                document.getElementById('adminName').innerText = `管理員：${result.name}`;
                loadAdminData();
            } else {
                errMsg.innerText = "❌ 帳號密碼錯誤或權限不足";
            }
        } catch (e) {
            errMsg.innerText = "❌ 無法連線至伺服器";
        }
    }

    // 讀取所有預約資料
    async function loadAdminData() {
        try {
            const res = await fetch(`${scriptURL}?type=adminRead`);
            allData = await res.json();
            // 按日期排，最近的在上面
            allData.sort((a, b) => new Date(b.Date) - new Date(a.Date));
            renderAdminTable();
        } catch (e) {
            alert("讀取資料失敗");
        }
    }

    // 渲染表格
    function renderAdminTable() {
        const filter = document.getElementById('statusFilter').value;
        const tbody = document.querySelector('#adminTable tbody');
        tbody.innerHTML = '';

        const displayData = filter === 'all' ? allData : allData.filter(d => d.Status === filter);

        displayData.forEach(row => {
            const isPending = (row.Status !== 'Approved');
            const statusLabel = row.Status === 'Approved' ? '已核准' : '待審核';
            const statusClass = row.Status === 'Approved' ? 'status-approved' : 'status-pending';

            tbody.innerHTML += `
                <tr>
                    <td>${row.Date.split(' ')[0]}</td>
                    <td><b>${row.Location}</b></td>
                    <td>${row.Applicant}</td>
                    <td>${row.TimeSlot}</td>
                    <td><span class="status-badge ${statusClass}">${statusLabel}</span></td>
                    <td>
                        ${isPending ? `<button class="btn btn-approve" onclick="updateStatus(${row.rowId}, 'Approved')">核准</button>` : ''}
                        <button class="btn btn-delete" onclick="deleteItem(${row.rowId})">刪除</button>
                    </td>
                </tr>
            `;
        });
    }

    // 核准功能
    async function updateStatus(rowId, status) {
        if(!confirm("確定要核准這筆預約嗎？")) return;
        await fetch(`${scriptURL}?type=update&row=${rowId}&status=${status}`);
        loadAdminData(); // 重新整理
    }

    // 刪除功能
    async function deleteItem(rowId) {
        if(!confirm("⚠️ 確定要永久刪除嗎？")) return;
        await fetch(`${scriptURL}?type=delete&row=${rowId}`);
        loadAdminData(); // 重新整理
    }
</script>
</body>
</html>
