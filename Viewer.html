<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>場地預約實時看板 - 終極修正版</title>
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js"></script>
    <style>
        :root { --approved-color: #2ecc71; --pending-color: #f39c12; --conflict-red: #d93025; --primary-blue: #1a73e8; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        
        /* 篩選面板 */
        .control-panel { background: #e8f0fe; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #d0e1fd; }
        .filter-group { display: flex; gap: 15px; flex-wrap: wrap; align-items: center; }
        select, input { padding: 8px 12px; border-radius: 6px; border: 1px solid #ccc; font-size: 14px; }
        
        /* 日曆區域 */
        #calendar { background: white; padding: 10px; border-radius: 8px; border: 1px solid #eee; min-height: 700px; margin-bottom: 30px; }
        
        /* 事件顯示優化 */
        .fc-event { cursor: pointer; padding: 2px 5px; border: none !important; margin-bottom: 1px !important; }
        .event-content { font-size: 11px; line-height: 1.4; white-space: normal; }
        .event-time { font-weight: bold; border-bottom: 1px solid rgba(255,255,255,0.4); display: block; margin-bottom: 2px; }

        /* 清單表格 */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        th { background: #f8f9fa; color: #555; font-size: 14px; }
        .badge-first { background: var(--conflict-red); color: white; padding: 2px 6px; border-radius: 4px; font-size: 11px; }
        .status-badge { padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: bold; }
        .bg-approved { background: #d4edda; color: #155724; }
        .bg-pending { background: #fff3cd; color: #856404; }
    </style>
</head>
<body>

<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <h2>📅 場地預約實時看板</h2>
        <div id="syncStatus" style="font-size:14px; color:var(--primary-blue); font-weight:bold;">系統初始化中...</div>
    </div>

    <div class="control-panel">
        <div class="filter-group">
            <div>
                <strong>📍 地點：</strong>
                <select id="locFilter" onchange="refreshDisplay()">
                    <option value="all">載入中...</option>
                </select>
            </div>
            <div>
                <strong>👤 申請人：</strong>
                <input type="text" id="nameFilter" placeholder="搜尋姓名" oninput="refreshDisplay()">
            </div>
            <div style="margin-left:auto; font-size: 12px;">
                <span style="color:var(--conflict-red); font-weight:bold;">● 可能重複</span> | 
                <span style="color:var(--approved-color); font-weight:bold;">● 已核准</span> | 
                <span style="color:var(--pending-color); font-weight:bold;">● 待處理</span>
            </div>
        </div>
    </div>

    <div id="calendar"></div>

    <hr>

    <h3>📋 預約詳細清單</h3>
    <div style="overflow-x:auto;">
        <table id="listTable">
            <thead>
                <tr>
                    <th>序位</th>
                    <th>日期</th>
                    <th>場地</th>
                    <th>申請人</th>
                    <th>預約時段</th>
                    <th>狀態</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
    // ⚠️ 請務必替換為你正確的 GAS 部署網址
    const scriptURL = 'https://script.google.com/macros/s/AKfycbww2t8hXiFGW_Zi71WMOxUYZaom1J8h0FdJ3EsdlyoZg45utiqTVFcHLdfa19_mQsfR/exec'; 
    
    let calendar;
    let allMonthData = [];

    document.addEventListener('DOMContentLoaded', function() {
        calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
            initialView: 'dayGridMonth',
            locale: 'zh-tw',
            height: 'auto',
            headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,listWeek' },
            // 自定義日曆內容顯示，解決 undefined 問題
            eventContent: function(arg) {
                let div = document.createElement('div');
                div.className = 'event-content';
                const timeStr = arg.event.extendedProps.time || "無時間資料";
                div.innerHTML = `
                    <span class="event-time">${timeStr}</span>
                    <span>${arg.event.title}</span>
                `;
                return { domNodes: [div] };
            },
            eventClick: function(info) {
                const p = info.event.extendedProps;
                alert(`📌 預約詳情\n------------------\n📍 場地：${p.location}\n👤 申請人：${p.applicant}\n⏰ 時間：${p.time}\n📝 用途：${p.purpose}\n📊 狀態：${p.status}`);
            },
            datesSet: function(info) {
                const date = info.view.currentStart;
                const monthStr = `${date.getFullYear()}-${(date.getMonth() + 1).toString().padStart(2, '0')}`;
                loadData(monthStr);
            }
        });
        calendar.render();
        loadSettings();
    });

    async function loadSettings() {
        try {
            const res = await fetch(`${scriptURL}?type=settings`);
            const locs = await res.json();
            const sel = document.getElementById('locFilter');
            sel.innerHTML = '<option value="all">所有場地</option>';
            locs.forEach(l => sel.innerHTML += `<option value="${l}">${l}</option>`);
        } catch(e) { console.error("設定加載失敗"); }
    }

    async function loadData(monthStr) {
        document.getElementById('syncStatus').innerText = `🔄 正在抓取 ${monthStr} 數據...`;
        try {
            const res = await fetch(`${scriptURL}?month=${monthStr}`);
            allMonthData = await res.json();
            // 依時間排序以區分先後順序
            allMonthData.sort((a, b) => new Date(a.Timestamp) - new Date(b.Timestamp));
            refreshDisplay();
            document.getElementById('syncStatus').innerText = `✅ ${monthStr} 數據已同步`;
        } catch (e) { 
            document.getElementById('syncStatus').innerText = "❌ 無法連接伺服器";
        }
    }

    function refreshDisplay() {
        const locVal = document.getElementById('locFilter').value;
        const nameVal = document.getElementById('nameFilter').value.toLowerCase();

        const filtered = allMonthData.filter(d => {
            const matchLoc = (locVal === 'all' || String(d.Location) === locVal);
            const matchName = (nameVal === '' || String(d.Applicant).toLowerCase().includes(nameVal));
            return matchLoc && matchName;
        });

        calendar.removeAllEvents();
        
        filtered.forEach(d => {
            // 修正：多重檢查時間欄位名稱，確保不出現 undefined
            const rawTime = d.TimeSlot || d.Time || "時間待查";

            // 衝突偵測：同日、同地、同時間
            const isDuplicate = filtered.filter(item => 
                item.Date === d.Date && 
                item.Location === d.Location && 
                (item.TimeSlot === d.TimeSlot || item.Time === d.Time)
            ).length > 1;

            calendar.addEvent({
                title: `${d.Location}-${d.Applicant}`,
                start: d.Date.split(' ')[0],
                color: isDuplicate ? '#d93025' : (d.Status === 'Approved' ? '#2ecc71' : '#f39c12'),
                extendedProps: {
                    time: rawTime,
                    applicant: d.Applicant,
                    location: d.Location,
                    purpose: d.Purpose || '未填寫',
                    status: d.Status
                }
            });
        });

        // 更新清單表格
        const tbody = document.querySelector('#listTable tbody');
        tbody.innerHTML = '';
        filtered.forEach((d, index) => {
            const isApproved = (d.Status === 'Approved');
            const displayTime = d.TimeSlot || d.Time || "N/A";
            tbody.innerHTML += `
                <tr>
                    <td>${index === 0 ? '<span class="badge-first">首位</span>' : index + 1}</td>
                    <td>${d.Date}</td>
                    <td><strong>${d.Location}</strong></td>
                    <td>${d.Applicant}</td>
                    <td>${displayTime}</td>
                    <td><span class="status-badge ${isApproved ? 'bg-approved' : 'bg-pending'}">
                        ${isApproved ? '已核准' : '待處理'}
                    </span></td>
                </tr>
            `;
        });
    }
</script>
</body>
</html>
