<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校園場地預約系統 - 登入版</title>
    <style>
        :root { --primary: #1a73e8; --secondary: #34a853; --danger: #d93025; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h2 { color: var(--primary); text-align: center; margin-top: 0; }
        .hidden { display: none; }
        
        /* 表單樣式 */
        label { display: block; margin-top: 15px; font-weight: bold; color: #555; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        input[readonly] { background: #e9ecef; cursor: not-allowed; }
        
        .time-row { display: flex; gap: 10px; }
        .time-row div { flex: 1; }
        
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 20px; }
        .btn-login { background: var(--primary); color: white; }
        .btn-submit { background: var(--secondary); color: white; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        
        #status, #loginMsg { text-align: center; margin-top: 15px; font-weight: bold; }
        .repeat-info { background: #fff3cd; border: 1px dashed #ffeeba; padding: 10px; border-radius: 8px; margin-top: 10px; font-size: 14px; }
    </style>
</head>
<body>

<div id="loginCard" class="card">
    <h2>🔐 系統登入</h2>
    <label>帳號 (Username)</label>
    <input type="text" id="uName" placeholder="請輸入帳號">
    <label>密碼 (Password)</label>
    <input type="password" id="uPass" placeholder="請輸入密碼">
    <button class="btn btn-login" onclick="handleLogin()">登入系統</button>
    <div id="loginMsg"></div>
</div>

<div id="bookingCard" class="card hidden">
    <h2>🏫 場地預約</h2>
    <p style="text-align:center; color:#666;">歡迎回來，<span id="userDisplayName" style="color:var(--primary); font-weight:bold;"></span></p>
    
    <label>申請人姓名</label>
    <input type="text" id="applicant" readonly>

    <label>預約地點</label>
    <select id="location">
        <option value="">載入中...</option>
    </select>

    <div class="time-row">
        <div>
            <label>開始時間</label>
            <input type="time" id="startTime" value="08:00">
        </div>
        <div>
            <label>結束時間</label>
            <input type="time" id="endTime" value="10:00">
        </div>
    </div>

    <label>預約日期</label>
    <input type="date" id="startDate" onchange="checkConflict()">

    <div class="repeat-info">
        <label style="margin-top:0;">♻️ 重複預約 (選填)</label>
        <small>重複結束日期</small>
        <input type="date" id="endDate">
        <small>重複星期幾</small>
        <select id="dayOfWeek">
            <option value="-1">不重複 (單次)</option>
            <option value="1">星期一</option><option value="2">星期二</option><option value="3">星期三</option>
            <option value="4">星期四</option><option value="5">星期五</option><option value="6">星期六</option>
            <option value="0">星期日</option>
        </select>
    </div>

    <label>預約用途</label>
    <textarea id="purpose" rows="2"></textarea>

    <button class="btn btn-submit" onclick="submitForm()">確認提交預約</button>
    <div id="status"></div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyn0dx3MVzeCTN3lsscDYIwWpMDNGyU52rq74t7xJDA39PUzTjByZz2lhn3shWT44se/exec'; // <--- 請放入 V4 版本的 GAS 網址
    let currentUser = "";

    // 1. 登入邏輯
    async function handleLogin() {
        const u = document.getElementById('uName').value;
        const p = document.getElementById('uPass').value;
        const msg = document.getElementById('loginMsg');
        
        if(!u || !p) return alert("請輸入帳密");
        
        msg.innerText = "驗證中...";
        try {
            const res = await fetch(`${scriptURL}?type=login&user=${u}&pass=${p}`);
            const result = await res.json();
            
            if(result.success) {
                currentUser = result.name;
                document.getElementById('loginCard').classList.add('hidden');
                document.getElementById('bookingCard').classList.remove('hidden');
                document.getElementById('userDisplayName').innerText = currentUser;
                document.getElementById('applicant').value = currentUser;
                loadSettings(); // 登入後載入場地
            } else {
                msg.innerText = "❌ 帳號或密碼錯誤";
                msg.style.color = "red";
            }
        } catch(e) {
            msg.innerText = "❌ 連線伺服器失敗";
        }
    }

    // 2. 載入場地清單
    async function loadSettings() {
        const res = await fetch(`${scriptURL}?type=settings`);
        const locs = await res.json();
        const sel = document.getElementById('location');
        sel.innerHTML = '<option value="">-- 請選擇場地 --</option>';
        locs.forEach(l => sel.innerHTML += `<option value="${l}">${l}</option>`);
    }

    // 3. 檢查重複 (當日期或地點改變時觸發)
    async function checkConflict() {
        const date = document.getElementById('startDate').value;
        const loc = document.getElementById('location').value;
        if(!date || !loc) return;

        const stat = document.getElementById('status');
        stat.innerText = "正在檢查該日佔用情況...";
        stat.style.color = "#666";

        const res = await fetch(`${scriptURL}?type=check&date=${date}&loc=${loc}`);
        const busy = await res.json();
        
        if(busy.length > 0) {
            stat.innerHTML = `⚠️ 該日已有預約：<br>${busy.join('<br>')}`;
            stat.style.color = "orange";
        } else {
            stat.innerText = "✅ 該時段目前無人預約";
            stat.style.color = "green";
        }
    }

    // 4. 提交表單
    async function submitForm() {
        const data = {
            Applicant: currentUser,
            Location: document.getElementById('location').value,
            Date: document.getElementById('startDate').value,
            TimeSlot: `${document.getElementById('startTime').value} - ${document.getElementById('endTime').value}`,
            Purpose: document.getElementById('purpose').value
        };

        if(!data.Location || !data.Date) return alert("請填寫完整場地與日期");

        // 處理重複預約邏輯
        const endD = document.getElementById('endDate').value;
        const dow = parseInt(document.getElementById('dayOfWeek').value);
        let payload = [];

        if(endD && dow !== -1) {
            let curr = new Date(data.Date);
            let last = new Date(endD);
            while(curr <= last) {
                if(curr.getDay() === dow) {
                    payload.push({...data, Date: curr.toISOString().split('T')[0]});
                }
                curr.setDate(curr.getDate() + 1);
            }
        } else {
            payload.push(data);
        }

        const stat = document.getElementById('status');
        stat.innerText = "正在提交...";
        
        try {
            await fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(payload)
            });
            stat.innerText = "🎉 提交成功！";
            stat.style.color = "green";
            document.getElementById('purpose').value = "";
        } catch(e) {
            stat.innerText = "❌ 提交失敗";
        }
    }
</script>
</body>
</html>
